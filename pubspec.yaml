name: seremi_adultos_mayores
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  alarm: ^4.0.0
  sqflite: ^2.3.0
  path: ^1.9.0

  supabase_flutter: ^2.0.0

  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  http: ^1.2.1

  # CORRECCIÓN: Se elimina flutter_local_notifications porque ahora
  # se usa el plugin 'alarm' que maneja todo internamente.

dependency_overrides:
  app_links: 6.3.2

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # CORRECCIÓN 1: Se agrega el sonido de alarma que faltaba
    - assets/sonidos/alarma.mp3
    - assets/imagenes/noche.jpg
    - assets/imagenes/mañana.jpg
    - assets/imagenes/dia.jpg
    # CORRECCIÓN 2: Se corrige la mayúscula de Iconos → iconos
    # (el nombre real de la carpeta en disco es "Iconos" con I mayúscula,
    #  asegúrate de que la carpeta en disco también se llame "Iconos")
    - assets/imagenes/Iconos/heart-cardiogram.svg
    - assets/imagenes/Iconos/i-schedule_school_date_time.svg
    - assets/imagenes/Iconos/medicines.svg
    - assets/imagenes/Iconos/walking.svg